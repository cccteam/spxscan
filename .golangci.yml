version: '2'
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - copyloopvar
    - cyclop
    - depguard
    - dogsled
    - durationcheck
    - errcheck
    - errorlint
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godox
    - gomoddirectives
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - makezero
    - misspell
    - nakedret
    - nestif
    - nilerr
    - nlreturn
    - noctx
    - nolintlint
    - paralleltest
    - prealloc
    - predeclared
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    revive:
      rules:
        - name: exported
          severity: warning
          arguments:
            - 'disable-checks-on-functions'
            - 'disable-checks-on-methods'
            - 'disable-checks-on-types'
            - 'disable-checks-on-constants'
    cyclop:
      max-complexity: 25
    depguard:
      rules:
        main:
          files:
            - $all
          allow:
            - cloud.google.com/go/civil
            - cloud.google.com/go/logging
            - cloud.google.com/go/spanner
            - github.com/AscendiumApps
            - github.com/aws
            - github.com/bits-and-blooms/bloom/v3
            - github.com/casbin
            - github.com/cccteam/access
            - github.com/cccteam/ccc
            - github.com/cccteam/ccc/accesstypes
            - github.com/cccteam/ccc/pkg
            - github.com/cccteam/ccc/resource
            - github.com/cccteam/ccc/securehash
            - github.com/cccteam/ccc/tracer
            - github.com/cccteam/db-initiator
            - github.com/cccteam/httpio
            - github.com/cccteam/logger
            - github.com/cccteam/session
            - github.com/cccteam/session/sessioninfo
            - github.com/cccteam/session/sessionstorage
            - github.com/cccteam/spxscan
            - github.com/cccteam/spxscan/spxapi
            - github.com/cenkalti
            - github.com/coreos/go-oidc
            - github.com/docker
            - github.com/dslipak
            - github.com/exaring/otelpgx
            - github.com/flowerinthenight/casbin-spanner-adapter
            - github.com/georgysavva
            - github.com/go-chi/chi/v5
            - github.com/go-ldap
            - github.com/go-playground
            - github.com/go-test
            - github.com/gofrs/uuid
            - github.com/golang
            - github.com/google
            - github.com/GoogleCloudPlatform/opentelemetry-operations-go/exporter/trace
            - github.com/gorilla/securecookie
            - github.com/goware/emailx
            - github.com/ianlopshire/go-fixedwidth
            - github.com/jackc
            - github.com/jtwatson
            - github.com/korylprince
            - github.com/nbutton23/zxcvbn-go
            - github.com/nyaruka/phonenumbers
            - github.com/sendgrid/rest
            - github.com/sendgrid/sendgrid-go
            - github.com/sethvargo/go-envconfig
            - github.com/shopspring/decimal
            - github.com/spf13/cobra
            - github.com/stretchr/testify
            - github.com/testcontainers
            - github.com/twilio/twilio-go
            - github.com/twilio/twilio-go/rest/api/v2010
            - go.opentelemetry.io/contrib/detectors/gcp
            - go.opentelemetry.io/otel
            - go.uber.org/mock
            - golang.org/x/crypto/pbkdf2
            - golang.org/x/sync/errgroup
            - google.golang.org/api/iterator
            - google.golang.org/grpc/codes
            - google.golang.org/grpc/status
            - $gostd
    dupl:
      threshold: 100
    exhaustive:
      default-signifies-exhaustive: true
    exhaustruct:
      exclude:
        - 'github.com/spf13/cobra.Command'
        - 'github.com/sethvargo/go-envconfig.Config'
    funlen:
      lines: 100
      statements: 50
    gocognit:
      min-complexity: 50
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 25
    godox:
      keywords:
        - TODO
        - BUG
    misspell:
      locale: US
    nestif:
      min-complexity: 10
    tagalign:
      order:
        - json
        - spanner
    tagliatelle:
      case:
        rules:
          json: camel
        use-field-name: true
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .Cause(
        - .RetryableError(
      ignore-package-globs:
        - github.com/cccteam/httpio*
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - exhaustruct
          - funlen
          - gochecknoglobals
          - gochecknoinits
          - gocognit
          - goconst
          - gocyclo
          - lll
          - mnd
          - nlreturn
          - scopelint
          - prealloc
        path: _test\.go
      - linters:
          - paralleltest
        path: pkg/communication/communication_emailer_test\.go|pkg/communication/communication_texter_test\.go
      - linters:
          - errcheck
        text: Rollback
      - linters:
          - gomoddirectives
        path: go\.mod
        text: replacement are not allowed
      - linters:
          - funlen
        path: pkg/router/router\.go
      - linters:
          - misspell
        path: pkg/resources/resources\.go
        source: Cancelled
      - linters:
          - gocognit
          - funlen
        path: pkg/contacts/contacts_file_upload\.go
      - linters:
          - tagliatelle
        path: apps/portal/pkg/contentmanagement/contentful/lesson_details\.go
        text: got '__typename' want 'typeName'
      - linters:
          - tagliatelle
        path: apps/portal/pkg/contentmanagement/contentful/four_option_questionnaire_details\.go
        text: got '__typename' want 'typeName'
        # This is just a test, we use creds within the context of the unit test
      - linters:
          - gosec
        path: pkg/password/password_test\.go
      # G704: URL provided in request is primarily configured by application.
      # All user provided input is URL encoded. This is not exploitable
      - linters:
          - gosec
        text: 'G704'
        path: apps/portal/pkg/contentmanagement/contentful/contentful\.go
      # G117: Password field in HTTP request structs receives values from client HTTPS requests,
      # not hardcoded credentials.
      - linters:
          - gosec
        text: 'G117'
        path: apps/portal/app/change_password\.go|apps/portal/app/create_learner_account\.go|apps/portal/pkg/rpc/create_learner_account\.go
      # G117: ClientSecret in OIDC config is populated from an environment variable, not a hardcoded value.
      - linters:
          - gosec
        text: 'G117'
        path: pkg/config/admin_config\.go
      # G704: SSRF false positive - base URL is hardcoded to api.sendgrid.com, not user-controlled.
      - linters:
          - gosec
        text: 'G704'
        path: pkg/communication/emailapi/client\.go
      # G703: Path traversal false positive, not input from an untrusted source.
      # This is ran in pipelines and in local dev, not accessible by malicious actors
      - linters:
          - gosec
        text: 'G703'
        path: cmd/bootstrap/main\.go
      - linters:
          - gosec
        text: 'G703'
        path: cmd/deployment/migrate/migrate\.go

    paths:
      - gui/node_modules
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - gui/node_modules
      - third_party$
      - builtin$
      - examples$